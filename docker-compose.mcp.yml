# IDE-over-HTTP overlay — publish the MCP servers on the host and run the agent ("ask") MCP
# servers, so Claude Code / Cursor / VS Code can connect via `--transport http`.
#
#   docker compose -f docker-compose.yml -f docker-compose.mcp.yml up -d --build
#   (or: make mcp-http)
#
# Endpoints (all FastMCP Streamable-HTTP at /mcp):
#   Option B (agents):  http://localhost:8090/mcp  (ask_finops)   http://localhost:8095/mcp  (ask_devops)
#   Option A (tools):   http://localhost:8081/mcp  (cost)  :8082 (optimize)  :8083 (anomaly)  :8085 (devops)
#
# Connector mode (default for tool servers):
#   Tool servers accept AWS credentials via X-Aws-* request headers so each user can
#   supply their own credentials when adding the server as a connector in their IDE or
#   in Claude.ai — no server-side profile or ~/.aws mount is needed.
#
#   Headers: X-Aws-Access-Key-Id, X-Aws-Secret-Access-Key, X-Aws-Session-Token (optional),
#            X-Aws-Region (optional)
#
# Server-side credentials (local dev / Docker stack):
#   If no X-Aws-* headers are present the servers fall back to build_session() which reads
#   ~/.aws (mounted read-only) or env vars. Set AWS_PROFILE in your .env to choose a profile.
#
# Agent servers (finops-ask / devops-ask) always need a server-side profile for Bedrock LLM
# calls — set AWS_PROFILE=finops / devops (or a profile with Bedrock invoke permission).

x-mcp-base: &mcp-base
  build: .
  image: aws-finops-agent:dev
  env_file:
    - path: .env
      required: false
  volumes:
    - ${HOME}/.aws:/home/finops/.aws:ro
    - ./config:/app/config:ro
  restart: unless-stopped

services:
  # --- Option A: publish the existing tool servers on the host ---
  # Credentials come from X-Aws-* request headers (connector mode).
  # For local dev with server-side creds, set AWS_PROFILE in .env.
  cost-tools:
    ports: ["8081:8081"]

  optimize-tools:
    ports: ["8082:8082"]

  anomaly-tools:
    ports: ["8083:8083"]

  devops-tools:
    ports: ["8085:8085"]

  # --- Option B: the agent ("ask") MCP servers over HTTP ---
  # These servers make Bedrock LLM calls and therefore need a server-side AWS profile.
  finops-ask:
    <<: *mcp-base
    environment:
      HOME: /home/finops
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_PROFILE: finops
      FINOPS_MODE: advisory
      FINOPS_MCP_HOST: "0.0.0.0"
      FINOPS_ASK_MCP_PORT: "8090"
    command: ["serve", "ask"]            # entrypoint is `finops` → ask_finops
    ports: ["8090:8090"]

  devops-ask:
    <<: *mcp-base
    entrypoint: ["devops"]
    environment:
      HOME: /home/finops
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_PROFILE: devops
      FINOPS_MCP_HOST: "0.0.0.0"
      DEVOPS_ASK_MCP_PORT: "8095"
    command: ["serve", "ask"]            # entrypoint `devops` → ask_devops
    ports: ["8095:8095"]
