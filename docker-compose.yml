# Distributed FinOps stack — every tier is its own container on a shared network:
#   cost-tools (MCP tool server) <- cost-agent (A2A sub-agent) <- orchestrator (A2A)
# All reuse one image (built from this repo) and the shared finops_core library.
# Credentials are wired three ways via FINOPS_AWS_AUTH (see .env.example); .env is optional.

x-finops-base: &finops-base
  build: .
  image: aws-finops-agent:dev
  env_file:
    - path: .env
      required: false
  volumes:
    - ${HOME}/.aws:/home/finops/.aws:ro      # local creds, read-only
    - ./config:/app/config:ro
  restart: unless-stopped

services:
  # One-shot identity + Bedrock preflight
  preflight:
    <<: *finops-base
    restart: "no"
    environment:
      HOME: /home/finops
      AWS_REGION: ${AWS_REGION:-us-east-1}
    command: ["preflight"]

  # One-shot scheduled digest. Run via cron/EventBridge: docker compose run --rm digest
  digest:
    <<: *finops-base
    restart: "no"
    profiles: ["digest"]
    environment:
      HOME: /home/finops
      AWS_REGION: ${AWS_REGION:-us-east-1}
    volumes:
      - ${HOME}/.aws:/home/finops/.aws:ro
      - ./config:/app/config:ro
      - ./reports:/app/reports
    command: ["digest", "--format", "md", "--deliver", "file"]

  # Distributed TOOL tier — Cost Explorer tools over MCP (Streamable HTTP)
  cost-tools:
    <<: *finops-base
    environment:
      HOME: /home/finops
      AWS_REGION: ${AWS_REGION:-us-east-1}
      FINOPS_MCP_HOST: "0.0.0.0"
      FINOPS_MCP_PORT: "8081"
    expose: ["8081"]
    command: ["serve", "cost-tools"]

  # Distributed SUB-AGENT tier — Cost-Analysis specialist over A2A (consumes cost-tools)
  cost-agent:
    <<: *finops-base
    depends_on: [cost-tools]
    environment:
      HOME: /home/finops
      AWS_REGION: ${AWS_REGION:-us-east-1}
      FINOPS_COST_TOOLS_URL: "http://cost-tools:8081/mcp"
      FINOPS_A2A_HOST: "0.0.0.0"
      FINOPS_A2A_PORT: "9001"
      FINOPS_A2A_PUBLIC_URL: "http://cost-agent:9001"
    expose: ["9001"]
    command: ["serve", "cost-agent"]

  # Optimization TOOL tier — savings recommendations over MCP
  optimize-tools:
    <<: *finops-base
    environment:
      HOME: /home/finops
      AWS_REGION: ${AWS_REGION:-us-east-1}
      FINOPS_MCP_HOST: "0.0.0.0"
      FINOPS_OPTIMIZE_MCP_PORT: "8082"
    expose: ["8082"]
    command: ["serve", "optimize-tools"]

  # Optimization SUB-AGENT tier — Optimization specialist over A2A
  optimize-agent:
    <<: *finops-base
    depends_on: [optimize-tools]
    environment:
      HOME: /home/finops
      AWS_REGION: ${AWS_REGION:-us-east-1}
      FINOPS_OPTIMIZE_TOOLS_URL: "http://optimize-tools:8082/mcp"
      FINOPS_A2A_HOST: "0.0.0.0"
      FINOPS_A2A_PORT: "9002"
      FINOPS_A2A_PUBLIC_URL: "http://optimize-agent:9002"
    expose: ["9002"]
    command: ["serve", "optimize-agent"]

  # Anomaly/Budget TOOL tier — Cost Anomaly Detection + Budgets over MCP
  anomaly-tools:
    <<: *finops-base
    environment:
      HOME: /home/finops
      AWS_REGION: ${AWS_REGION:-us-east-1}
      FINOPS_MCP_HOST: "0.0.0.0"
      FINOPS_ANOMALY_MCP_PORT: "8083"
    expose: ["8083"]
    command: ["serve", "anomaly-tools"]

  # Anomaly/Budget SUB-AGENT tier — Anomaly & Budget specialist over A2A
  anomaly-agent:
    <<: *finops-base
    depends_on: [anomaly-tools]
    environment:
      HOME: /home/finops
      AWS_REGION: ${AWS_REGION:-us-east-1}
      FINOPS_ANOMALY_TOOLS_URL: "http://anomaly-tools:8083/mcp"
      FINOPS_A2A_HOST: "0.0.0.0"
      FINOPS_A2A_PORT: "9003"
      FINOPS_A2A_PUBLIC_URL: "http://anomaly-agent:9003"
    expose: ["9003"]
    command: ["serve", "anomaly-agent"]

  # ORCHESTRATOR tier — routes to specialists over A2A; single entrypoint
  orchestrator:
    <<: *finops-base
    depends_on: [cost-agent, optimize-agent, anomaly-agent]
    environment:
      HOME: /home/finops
      AWS_REGION: ${AWS_REGION:-us-east-1}
      FINOPS_COST_AGENT_URL: "http://cost-agent:9001"
      FINOPS_OPTIMIZE_AGENT_URL: "http://optimize-agent:9002"
      FINOPS_ANOMALY_AGENT_URL: "http://anomaly-agent:9003"
      FINOPS_A2A_HOST: "0.0.0.0"
      FINOPS_A2A_PORT: "9000"
      FINOPS_A2A_PUBLIC_URL: "http://orchestrator:9000"
    ports: ["9000:9000"]
    command: ["serve", "orchestrator"]

  # INTERFACE tier — FastAPI gateway (REST + OpenAPI). Deterministic data endpoints;
  # /query routes via the IntentRouter to the specialist A2A sub-agents.
  api:
    <<: *finops-base
    depends_on: [cost-agent, optimize-agent, anomaly-agent]
    entrypoint: ["uvicorn"]
    command: ["apps.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      HOME: /home/finops
      AWS_REGION: ${AWS_REGION:-us-east-1}
      FINOPS_COST_AGENT_URL: "http://cost-agent:9001"
      FINOPS_OPTIMIZE_AGENT_URL: "http://optimize-agent:9002"
      FINOPS_ANOMALY_AGENT_URL: "http://anomaly-agent:9003"
    ports: ["8000:8000"]

  # INTERFACE tier — Streamlit dashboard. Numbers are deterministic (in-process Cost
  # Explorer); the chat panel routes via the IntentRouter to the specialist A2A sub-agents.
  dashboard:
    <<: *finops-base
    depends_on: [cost-agent, optimize-agent, anomaly-agent]
    entrypoint: ["streamlit"]
    command: ["run", "apps/dashboard/app.py",
              "--server.address=0.0.0.0", "--server.port=8501",
              "--server.headless=true", "--browser.gatherUsageStats=false"]
    environment:
      HOME: /home/finops
      AWS_REGION: ${AWS_REGION:-us-east-1}
      # Chat uses the deterministic IntentRouter → routes to these specialists over A2A
      FINOPS_COST_AGENT_URL: "http://cost-agent:9001"
      FINOPS_OPTIMIZE_AGENT_URL: "http://optimize-agent:9002"
      FINOPS_ANOMALY_AGENT_URL: "http://anomaly-agent:9003"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    ports: ["8501:8501"]
