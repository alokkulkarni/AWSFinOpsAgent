# Observability overlay — OTEL Collector fan-out to Jaeger (traces) + Prometheus (metrics) +
# debug/file exporters. Run alongside the base stack:
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up
#   (or: make observability)
#
# UIs:  Jaeger  http://localhost:16686   ·   Prometheus  http://localhost:9090
#
# The app services get OTEL_EXPORTER_OTLP_ENDPOINT + FINOPS_TELEMETRY here (merged with their base
# `environment`), so telemetry exports to the collector instead of the console.

x-otel-env: &otel-env
  FINOPS_TELEMETRY: "1"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel/config.yaml:ro
      - otel-data:/data
    ports:
      - "4317:4317"   # OTLP gRPC  (apps -> collector)
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus scrape endpoint
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Jaeger UI
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"   # Prometheus UI
    restart: unless-stopped

  # Point every app service at the collector (env deep-merges with the base service definitions).
  cost-tools:     { environment: *otel-env }
  cost-agent:     { environment: *otel-env }
  optimize-tools: { environment: *otel-env }
  optimize-agent: { environment: *otel-env }
  anomaly-tools:  { environment: *otel-env }
  anomaly-agent:  { environment: *otel-env }
  orchestrator:   { environment: *otel-env }
  devops-tools:   { environment: *otel-env }
  devops-agent:   { environment: *otel-env }
  api:            { environment: *otel-env }
  dashboard:      { environment: *otel-env }

volumes:
  otel-data:
