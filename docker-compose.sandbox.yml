# Hardened sandbox overlay for the distributed stack. Apply on top of docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.sandbox.yml up -d
# Read-only root FS, dropped Linux caps, no privilege escalation, resource limits.

x-hardened: &hardened
  read_only: true
  tmpfs:
    - /tmp
    - /home/finops/.cache
  cap_drop: ["ALL"]
  security_opt:
    - no-new-privileges:true
  pids_limit: 512
  mem_limit: 1g

services:
  preflight:
    <<: *hardened
  cost-tools:
    <<: *hardened
  cost-agent:
    <<: *hardened
  optimize-tools:
    <<: *hardened
  optimize-agent:
    <<: *hardened
  anomaly-tools:
    <<: *hardened
  anomaly-agent:
    <<: *hardened
  orchestrator:
    <<: *hardened
  devops-tools:
    <<: *hardened
  devops-agent:
    <<: *hardened
  api:
    <<: *hardened
  dashboard:
    read_only: true
    tmpfs:
      - /tmp
      - /home/finops/.cache
      - /home/finops/.streamlit     # streamlit writes config/usage here
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    mem_limit: 1g
