# OpenTelemetry Collector — the routing/fan-out layer for the FinOps + DevSecOps agents.
#
# It receives OTLP from every service, applies volume + privacy processors, and fans each signal
# out to multiple consumers:
#   traces  -> Jaeger (UI)        + debug + file
#   metrics -> Prometheus (scrape) + debug
#   logs    -> debug + file
#
# Best practices embodied here (the doc's five points):
#   * Standardize        : OTLP in, vendor-neutral pipelines out.
#   * Fan-out            : multiple exporters per signal (different stakeholders/use-cases).
#   * Optimize volume    : memory_limiter + batch (batching) and tail_sampling (keep errors/slow,
#                          sample the rest), attributes processor drops bulky content keys.
#   * Security/privacy   : redaction processor masks account ids / emails / ARNs as a SECOND pass
#                          (defense-in-depth on top of the app-side RedactingSpanProcessor).
#   * Retention/access   : see docs/OBSERVABILITY.md — set backend retention + restrict the UIs.
#
# Needs the *contrib* collector image (redaction + tail_sampling processors).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 25

  batch:
    timeout: 5s
    send_batch_size: 1024
    send_batch_max_size: 2048

  # Defense-in-depth PII scrub. The app already redacts what it controls; this also catches spans
  # from libraries we don't control. allow_all_keys=true keeps keys, masking only matching VALUES.
  redaction:
    allow_all_keys: true
    blocked_values:
      - "\\b\\d{12}\\b"                                      # AWS account ids
      - "[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}"    # emails
      - "arn:aws:[^\\s\"']+"                                 # ARNs (often embed account id + name)
    summary: info

  # Drop any bulky gen_ai content that survived (volume + privacy). Safe no-op if absent.
  attributes/drop_content:
    actions:
      - { key: gen_ai.prompt, action: delete }
      - { key: gen_ai.completion, action: delete }
      - { key: gen_ai.system.message, action: delete }

  # Tail sampling = the volume knob: ALWAYS keep errors + slow traces; sample the boring rest.
  tail_sampling:
    decision_wait: 10s
    num_traces: 50000
    policies:
      - name: keep-errors
        type: status_code
        status_code: { status_codes: [ERROR] }
      - name: keep-slow
        type: latency
        latency: { threshold_ms: 1000 }
      - name: sample-rest
        type: probabilistic
        probabilistic: { sampling_percentage: 20 }

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  prometheus:
    endpoint: 0.0.0.0:8889
    resource_to_telemetry_conversion:
      enabled: true
  debug:
    verbosity: normal
  file:
    path: /data/telemetry.jsonl

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, redaction, attributes/drop_content, tail_sampling, batch]
      exporters: [otlp/jaeger, debug, file]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, redaction, batch]
      exporters: [debug, file]
  telemetry:
    logs:
      level: info
